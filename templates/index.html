<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus AI Engine</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.5/dist/purify.min.js"></script>
    <script src="//unpkg.com/3d-force-graph"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background-color: #0c0c0f; margin: 0; }
        h1, h2, h3, .font-display { font-family: 'Outfit', sans-serif; }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.15); }

        /* --- Sidebar --- */
        .sidebar {
            background: linear-gradient(180deg, #111114 0%, #0e0e11 100%);
            border-right: 1px solid rgba(255,255,255,0.06);
        }
        .sidebar-item {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .sidebar-item:hover { background: rgba(255,255,255,0.04); }
        .sidebar-item.active { 
            background: rgba(45, 212, 191, 0.08);
            border-color: rgba(45, 212, 191, 0.15);
        }

        /* --- Main Chat --- */
        .chat-area-bg {
            background-color: #0c0c0f;
            background-image: radial-gradient(ellipse at 50% 0%, rgba(45, 212, 191, 0.03) 0%, transparent 60%);
        }

        /* --- Glassmorphism --- */
        .glass-panel {
            background: rgba(18, 18, 22, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.07);
        }

        /* --- Prose / Markdown --- */
        .prose pre { background-color: #141418 !important; padding: 1rem; border-radius: 0.75rem; overflow-x: auto; border: 1px solid rgba(255, 255, 255, 0.06); margin-top: 1em; margin-bottom: 1em; }
        .prose code { background-color: rgba(255,255,255,0.08); padding: 0.15rem 0.4rem; border-radius: 0.3rem; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 0.85em; }
        .prose pre code { background-color: transparent; padding: 0; }
        .prose p { margin-bottom: 0.6em; }
        .prose ul, .prose ol { margin-top: 0.5em; margin-bottom: 0.5em; }

        /* --- Animations --- */
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .anim-slide-in { animation: slideUp 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .anim-fade { animation: fadeIn 0.5s ease forwards; }

        /* --- Thinking Dots --- */
        .dot-typing { display: inline-flex; align-items: center; gap: 5px; padding: 8px 4px; }
        .dot-typing .dot {
            width: 7px; height: 7px;
            background: linear-gradient(135deg, #2dd4bf, #14b8a6);
            border-radius: 50%;
            animation: dotPulse 1.4s infinite ease-in-out both;
        }
        .dot-typing .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot-typing .dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes dotPulse {
            0%, 80%, 100% { transform: scale(0.4); opacity: 0.4; }
            40% { transform: scale(1); opacity: 1; }
        }

        /* --- Status Badge --- */
        @keyframes pulseGlow {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }
        .status-dot { 
            width: 6px; height: 6px; border-radius: 50%; 
            background: #2dd4bf; 
            animation: pulseGlow 2s infinite; 
            box-shadow: 0 0 6px rgba(45, 212, 191, 0.4);
        }

        /* --- Input --- */
        textarea { resize: none; transition: height 0.2s ease; }

        /* --- Welcome Hero --- */
        .welcome-hero {
            animation: fadeIn 0.6s ease forwards;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-6px); }
        }
        .float-anim { animation: float 4s ease-in-out infinite; }

        /* --- Suggestion Cards --- */
        .suggestion-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }
        .suggestion-card:hover {
            background: rgba(45, 212, 191, 0.06);
            border-color: rgba(45, 212, 191, 0.2);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(45, 212, 191, 0.06);
        }

        /* --- Message Bubbles --- */
        .msg-ai {
            background: transparent;
        }
        .msg-user-bubble {
            background: linear-gradient(135deg, rgba(45, 212, 191, 0.12), rgba(20, 184, 166, 0.08));
            border: 1px solid rgba(45, 212, 191, 0.12);
        }

        /* --- Send Button --- */
        .send-btn {
            background: linear-gradient(135deg, #2dd4bf, #14b8a6);
            color: #0c0c0f;
            transition: all 0.2s ease;
        }
        .send-btn:hover { box-shadow: 0 0 20px rgba(45, 212, 191, 0.3); transform: scale(1.05); }
        .send-btn:disabled { opacity: 0.3; transform: none; box-shadow: none; }

        /* --- Web Search Active --- */
        .web-search-active {
            background: rgba(59, 130, 246, 0.2) !important;
            color: #60a5fa !important;
            border-color: rgba(59, 130, 246, 0.3) !important;
            box-shadow: 0 0 12px rgba(59, 130, 246, 0.15);
        }

        /* --- Thinking Active --- */
        .think-active {
            background: rgba(234, 179, 8, 0.15) !important;
            color: #facc15 !important;
            border-color: rgba(234, 179, 8, 0.25) !important;
            box-shadow: 0 0 15px rgba(234, 179, 8, 0.1);
        }
        
        .think-block {
            border-left: 2px solid rgba(234, 179, 8, 0.5);
            background: rgba(234, 179, 8, 0.03);
            border-radius: 0 0.5rem 0.5rem 0;
            padding: 0.75rem 1rem;
            margin-bottom: 1rem;
            color: #a1a1aa;
            font-size: 0.9em;
        }

        /* Shimmer */
        .shimmer {
            background: linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.03) 50%, rgba(255,255,255,0) 100%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }

        /* --- Voice / Mic --- */
        .mic-active {
            background: rgba(239, 68, 68, 0.2) !important;
            color: #f87171 !important;
            border: 1px solid rgba(239, 68, 68, 0.4) !important;
            box-shadow: 0 0 18px rgba(239, 68, 68, 0.25) !important;
        }
        .tts-active {
            background: rgba(168, 85, 247, 0.15) !important;
            color: #c084fc !important;
            border: 1px solid rgba(168, 85, 247, 0.3) !important;
            box-shadow: 0 0 12px rgba(168, 85, 247, 0.15) !important;
        }
        @keyframes micPulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
            50% { box-shadow: 0 0 0 8px rgba(239, 68, 68, 0); }
        }
        .mic-active { animation: micPulse 1.2s infinite ease-in-out !important; }

        /* Waveform bar overlay */
        #voice-indicator {
            display: none;
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            margin-bottom: 10px;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.25);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 8px 18px;
            display: none;
            align-items: center;
            gap: 4px;
        }
        #voice-indicator.active { display: flex; }
        .voice-bar {
            width: 3px; border-radius: 99px; background: #f87171;
            animation: waveAnim 0.8s ease-in-out infinite alternate;
        }
        .voice-bar:nth-child(1) { height: 8px; animation-delay: 0s; }
        .voice-bar:nth-child(2) { height: 16px; animation-delay: 0.1s; }
        .voice-bar:nth-child(3) { height: 22px; animation-delay: 0.2s; }
        .voice-bar:nth-child(4) { height: 14px; animation-delay: 0.3s; }
        .voice-bar:nth-child(5) { height: 20px; animation-delay: 0.15s; }
        .voice-bar:nth-child(6) { height: 10px; animation-delay: 0.25s; }
        .voice-bar:nth-child(7) { height: 18px; animation-delay: 0.05s; }
        @keyframes waveAnim {
            from { transform: scaleY(0.4); opacity: 0.6; }
            to { transform: scaleY(1); opacity: 1; }
        }
    </style>
</head>

<body class="text-zinc-300 h-screen flex overflow-hidden antialiased selection:bg-teal-500/30">

    <!-- Sidebar -->
    <div class="hidden md:flex w-[260px] sidebar z-10 flex-col h-full">
        <!-- Logo -->
        <div class="p-5 pb-3 flex items-center gap-3">
            <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-teal-400 to-emerald-500 flex items-center justify-center shadow-lg shadow-teal-500/20">
                <svg class="w-5 h-5 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
            </div>
            <div>
                <h1 class="font-display font-bold text-[17px] text-white tracking-tight">Nexus</h1>
                <p class="text-[10px] text-zinc-500 font-medium uppercase tracking-widest">AI Engine</p>
            </div>
        </div>

        <!-- New Chat -->
        <div class="px-3 mb-3">
            <button onclick="startNewChat()" class="w-full flex items-center gap-2.5 p-2.5 rounded-xl text-sm font-medium text-zinc-300 hover:bg-white/5 transition-all border border-white/5 hover:border-white/10">
                <svg class="w-4 h-4 text-teal-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                New Chat
            </button>
        </div>
        
        <!-- Chat History -->
        <div class="flex-1 overflow-y-auto px-3 pb-4">
            <p class="text-[10px] font-semibold text-zinc-600 mb-2 px-2 uppercase tracking-widest">History</p>
            <div id="chat-list" class="flex flex-col space-y-0.5"></div>
        </div>

        <!-- Knowledge Map Button -->
        <div class="px-3 pb-3">
            <button onclick="toggleKnowledgeMap()" class="w-full flex items-center gap-2.5 p-2.5 rounded-xl text-sm font-bold text-amber-500 bg-amber-500/10 hover:bg-amber-500/20 transition-all border border-amber-500/20 shadow-[0_0_15px_rgba(245,158,11,0.15)]">
                <svg class="w-4 h-4 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-4.96.44 2.5 2.5 0 0 1-2.96-3.08 3 3 0 0 1-.34-5.58 2.5 2.5 0 0 1 1.32-4.24 2.5 2.5 0 0 1 1.98-3A2.5 2.5 0 0 1 9.5 2Z"/><path d="M14.5 2A2.5 2.5 0 0 0 12 4.5v15a2.5 2.5 0 0 0 4.96.44 2.5 2.5 0 0 0 2.96-3.08 3 3 0 0 0 .34-5.58 2.5 2.5 0 0 0-1.32-4.24 2.5 2.5 0 0 0-1.98-3A2.5 2.5 0 0 0 14.5 2Z"/></svg>
                Nexus Brain Map
            </button>
        </div>

        <!-- Settings Button -->
        <div class="p-3 border-t border-white/5">
            <button onclick="toggleSettings()" class="flex items-center gap-3 w-full p-2.5 rounded-xl hover:bg-white/5 transition-colors text-sm text-zinc-400 font-medium">
                <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 15a3 3 0 100-6 3 3 0 000 6z"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
                Settings
            </button>
        </div>
    </div>

    <!-- Main Chat Area -->
    <div class="flex-1 flex flex-col h-full relative chat-area-bg">
        <div id="chat-container" class="flex-1 overflow-y-auto w-full pb-44 pt-6 px-4 sm:px-6">
            <div id="chat" class="max-w-3xl mx-auto flex flex-col space-y-6">
                <!-- Chat messages injected here -->
            </div>
        </div>

        <!-- Input Area -->
        <div class="absolute bottom-0 left-0 w-full bg-gradient-to-t from-[#0c0c0f] via-[#0c0c0f]/95 to-transparent pt-16 pb-6 px-4 sm:px-6 z-20">
            <div class="max-w-3xl mx-auto">
                <div class="relative glass-panel rounded-2xl group-focus-within:border-teal-500/30 transition-all flex flex-col p-2.5 shadow-2xl shadow-black/40">
                    <div id="staged-files" class="flex flex-wrap gap-2 mb-2 px-1 empty:hidden"></div>
                    
                    <div class="flex items-end gap-1">
                        <!-- File Upload Input Hidden -->
                        <input type="file" id="file-upload" class="hidden" accept=".pdf,.txt,.md,.csv,.xlsx,.xls,image/*" onchange="handleFileUpload(event)">
                        
                        <button onclick="document.getElementById('file-upload').click()" class="p-2.5 mb-0.5 text-zinc-500 hover:text-zinc-300 hover:bg-white/5 rounded-xl transition-all shrink-0" title="Attach Document">
                            <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path></svg>
                        </button>
                        
                        <button id="web-search-btn" onclick="toggleWebSearch()" class="p-2.5 mb-0.5 text-zinc-500 hover:text-zinc-300 hover:bg-white/5 rounded-xl transition-all shrink-0 flex items-center" title="Force Web Search">
                            <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>
                        </button>
                        
                        <button id="think-btn" onclick="toggleThinking()" class="p-2.5 mb-0.5 text-zinc-500 hover:text-zinc-300 hover:bg-white/5 rounded-xl transition-all shrink-0 flex items-center" title="Thinking Mode">
                            <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H15M12 17V21M7.9 11.2C7.3 10.5 7 9.8 7 9C7 6.2 9.2 4 12 4C14.8 4 17 6.2 17 9C17 9.8 16.7 10.5 16.1 11.2C15.2 12.3 15 13.5 15 15H9C9 13.5 8.8 12.3 7.9 11.2Z"></path></svg>
                        </button>

                        <textarea 
                            id="input" 
                            rows="1"
                            placeholder="Start your conversation..." 
                            class="w-full max-h-[200px] bg-transparent text-zinc-100 placeholder-zinc-600 px-3 py-2.5 border-none outline-none focus:ring-0 text-[15px] leading-relaxed"
                        ></textarea>
                        
                        <!-- Mic Button -->
                        <div class="relative">
                            <div id="voice-indicator">
                                <div class="voice-bar"></div><div class="voice-bar"></div><div class="voice-bar"></div>
                                <div class="voice-bar"></div><div class="voice-bar"></div><div class="voice-bar"></div>
                                <div class="voice-bar"></div>
                            </div>
                            <button id="mic-btn" onclick="toggleMic()" class="p-2.5 mb-0.5 text-zinc-500 hover:text-zinc-300 hover:bg-white/5 rounded-xl transition-all shrink-0 flex items-center" title="Voice Input (Hold to Speak)">
                                <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M12 2a3 3 0 0 1 3 3v7a3 3 0 0 1-6 0V5a3 3 0 0 1 3-3z"/>
                                    <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                                    <line x1="12" y1="19" x2="12" y2="23"/>
                                    <line x1="8" y1="23" x2="16" y2="23"/>
                                </svg>
                            </button>
                        </div>

                        <!-- TTS Speaker Toggle -->
                        <button id="tts-btn" onclick="toggleTTS()" class="p-2.5 mb-0.5 text-zinc-500 hover:text-zinc-300 hover:bg-white/5 rounded-xl transition-all shrink-0 flex items-center" title="Read Aloud (TTS)">
                            <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
                                <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
                                <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
                            </svg>
                        </button>

                        <button id="send-btn" onclick="sendMessage()" class="send-btn p-2.5 mb-0.5 rounded-xl disabled:cursor-not-allowed shrink-0">
                            <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="19" x2="12" y2="5"></line><polyline points="5 12 12 5 19 12"></polyline></svg>
                        </button>
                    </div>
                </div>
                <!-- Quick Suggestions beneath input -->
                <div id="quick-suggestions" class="flex justify-center gap-2 mt-3 flex-wrap"></div>
            </div>
        </div>
    </div>

    <!-- Knowledge Map Modal -->
    <div id="knowledge-modal" class="hidden fixed inset-0 bg-[#0c0c0f]/90 backdrop-blur-xl z-[60] flex flex-col items-center justify-center opacity-0 transition-opacity duration-300">
        <button onclick="toggleKnowledgeMap()" class="absolute top-6 right-8 text-zinc-400 hover:text-white p-2.5 rounded-xl border border-white/10 hover:bg-white/10 transition-all z-[70] bg-black/40 backdrop-blur-md flex items-center gap-2 text-sm font-semibold">
            <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            Close Map
        </button>
        <div class="absolute top-8 left-8 z-[70] pointer-events-none">
            <h1 class="text-3xl font-display font-bold text-white tracking-tight drop-shadow-lg">Nexus <span class="text-amber-500">Brain</span></h1>
            <p class="text-zinc-400 font-medium">Interactive 3D Constellation of Memory</p>
            <p class="text-[11px] text-zinc-500 mt-2 max-w-sm">Drag to rotate, scroll to zoom, hover glowing orbs to read memories.</p>
        </div>
        <div id="3d-graph-container" class="w-full h-full cursor-move"></div>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal" class="hidden fixed inset-0 bg-black/60 z-50 flex items-center justify-center backdrop-blur-md opacity-0 transition-opacity duration-300">
        <div class="bg-[#141418] border border-white/8 rounded-2xl w-full max-w-lg p-6 shadow-2xl shadow-black/60 transform scale-95 transition-transform duration-300">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-lg font-display font-semibold text-white">Settings</h2>
                <button onclick="toggleSettings()" class="text-zinc-500 hover:text-white p-1.5 rounded-lg hover:bg-white/5 transition-colors">
                    <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            </div>
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-semibold text-zinc-500 mb-1.5 uppercase tracking-wider">System Instructions</label>
                    <textarea id="sys-prompt" rows="4" class="w-full bg-black/30 text-zinc-200 border border-white/8 rounded-xl p-3.5 focus:border-teal-500/40 focus:ring-1 focus:ring-teal-500/20 outline-none transition-all resize-none text-sm" placeholder="You are Nexus..."></textarea>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-zinc-500 mb-1.5 uppercase tracking-wider">Model</label>
                    <select id="model-select" class="w-full bg-black/30 text-zinc-200 border border-white/8 rounded-xl p-3 focus:border-teal-500/40 outline-none appearance-none cursor-pointer text-sm">
                        <option value="gemma4:e2b">Loading models...</option>
                    </select>
                </div>
                
                <div>
                    <label class="block text-xs font-semibold text-zinc-500 mb-1.5 uppercase tracking-wider">Tavily API Key (Deep Search)</label>
                    <input type="password" id="tavily-key" class="w-full bg-black/30 text-zinc-200 border border-white/8 rounded-xl p-3 focus:border-teal-500/40 outline-none transition-all text-sm" placeholder="tvly-xxxxxxxxxxxxxxx">
                </div>

                <!-- Deep Tools Toggle -->
                <div class="flex items-center justify-between p-3.5 rounded-xl bg-white/[0.02] border border-white/5">
                    <div>
                        <p class="text-sm font-medium text-zinc-200">Deep Tools</p>
                        <p class="text-xs text-zinc-600 mt-0.5">Web search, document RAG, memory, shell.</p>
                    </div>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" id="tools-toggle" checked class="sr-only peer">
                        <div class="w-11 h-6 bg-zinc-800 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-teal-500"></div>
                    </label>
                </div>

                <!-- Swarm Orchestration Toggle -->
                <div class="flex items-center justify-between p-3.5 rounded-xl bg-white/[0.02] border border-white/5">
                    <div>
                        <p class="text-sm font-medium text-zinc-200">Swarm Orchestration</p>
                        <p class="text-xs text-zinc-600 mt-0.5">Multi-Agent Router (adds ~1s latency).</p>
                    </div>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" id="router-toggle" checked class="sr-only peer">
                        <div class="w-11 h-6 bg-zinc-800 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-teal-500"></div>
                    </label>
                </div>

                <button onclick="saveSettings()" class="w-full bg-gradient-to-r from-teal-500 to-emerald-500 text-white font-semibold py-3 rounded-xl transition-all mt-2 shadow-lg shadow-teal-500/20 hover:shadow-teal-500/30 hover:brightness-110">Save Preferences</button>
            </div>
        </div>
    </div>

    <script>
        let chats = [];
        let currentChatId = null;
        let messageHistory = [];
        let stagedFiles = []; // Track active uploaded files for the next prompt
        let stagedImages = []; // Track base64 image strings
        let systemPrompt = localStorage.getItem('ai_sys_prompt') || '';
        let toolsEnabled = localStorage.getItem('ai_tools_enabled') !== 'false';
        let routerEnabled = localStorage.getItem('ai_router_enabled') !== 'false';
        let activeModel = localStorage.getItem('ai_model') || 'gemma4:e2b';
        let forceWebSearch = false;
        let thinkingEnabled = false;
        let tavilyApiKey = localStorage.getItem('ai_tavily_key') || '';

        const chatEl = document.getElementById("chat");
        const chatContainer = document.getElementById("chat-container");
        const inputEl = document.getElementById("input");
        const sendBtn = document.getElementById("send-btn");
        const chatListEl = document.getElementById("chat-list");

        document.addEventListener("DOMContentLoaded", () => {
            const stored = localStorage.getItem('ai_chats_v3'); // increment version to drop old invalid histories
            chats = stored ? JSON.parse(stored) : [];
            document.getElementById("sys-prompt").value = systemPrompt;
            document.getElementById("tools-toggle").checked = toolsEnabled;
            document.getElementById("router-toggle").checked = routerEnabled;
            document.getElementById("tavily-key").value = tavilyApiKey;
            fetchModels();
            
            if (chats.length === 0) startNewChat();
            else loadChat(chats[0].id);
            renderSidebar();
        });

        inputEl.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight > 200 ? 200 : this.scrollHeight) + 'px';
        });

        inputEl.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        let graphInstance = null;
        let spinAngle = 0;

        async function toggleKnowledgeMap() {
            const modal = document.getElementById("knowledge-modal");
            if (modal.classList.contains('hidden')) {
                modal.classList.remove('hidden');
                setTimeout(() => modal.classList.remove('opacity-0'), 10);
                
                // Initialize graph if not already done
                if (!graphInstance) {
                    const container = document.getElementById('3d-graph-container');
                    try {
                        const res = await fetch('/memories_graph');
                        const data = await res.json();
                        if (data.error) throw new Error(data.error);

                        if (data.nodes.length <= 1) {
                            container.innerHTML = '<div class="absolute inset-0 flex items-center justify-center text-zinc-500 font-medium">No long-term memories have been saved yet. Chat with Nexus and ask it to remember things!</div>';
                            return;
                        }

                        graphInstance = ForceGraph3D()(container)
                            .graphData(data)
                            .nodeLabel('desc')
                            .nodeColor('color')
                            .nodeVal('val')
                            .linkColor(() => 'rgba(255, 255, 255, 0.15)')
                            .backgroundColor('rgba(0,0,0,0)')
                            .onNodeHover(node => container.style.cursor = node ? 'pointer' : null);
                            
                        // Spin effect
                        setInterval(() => {
                            if (!modal.classList.contains('hidden')) {
                                graphInstance.cameraPosition({
                                    x: 80 * Math.sin(spinAngle),
                                    z: 80 * Math.cos(spinAngle)
                                });
                                spinAngle += Math.PI / 600;
                            }
                        }, 25);
                    } catch (e) {
                        console.error('Failed to load map data:', e);
                        container.innerHTML = `<div class="absolute inset-0 flex items-center justify-center text-red-400">Failed to load memory graph: ${e.message}</div>`;
                    }
                }
            } else {
                modal.classList.add('opacity-0');
                setTimeout(() => modal.classList.add('hidden'), 300);
            }
        }

        function toggleSettings() {
            const modal = document.getElementById("settings-modal");
            const modalInner = modal.querySelector('div');
            
            if (modal.classList.contains('hidden')) {
                modal.classList.remove('hidden');
                setTimeout(() => {
                    modal.classList.remove('opacity-0');
                    modalInner.classList.remove('scale-95');
                }, 10);
            } else {
                modal.classList.add('opacity-0');
                modalInner.classList.add('scale-95');
                setTimeout(() => {
                    modal.classList.add('hidden');
                }, 300);
            }
        }

        async function fetchModels() {
            try {
                const res = await fetch('/models');
                const data = await res.json();
                const select = document.getElementById('model-select');
                if (data.models && data.models.length > 0) {
                    select.innerHTML = data.models.map(m => `<option value="${m}">${m}</option>`).join('');
                    if (data.models.includes(activeModel)) {
                        select.value = activeModel;
                    } else {
                        activeModel = data.models[0];
                        select.value = activeModel;
                    }
                }
            } catch (e) {
                console.error("Failed to load models", e);
            }
        }

        function saveSettings() {
            systemPrompt = document.getElementById("sys-prompt").value;
            toolsEnabled = document.getElementById("tools-toggle").checked;
            routerEnabled = document.getElementById("router-toggle").checked;
            activeModel = document.getElementById("model-select").value;
            tavilyApiKey = document.getElementById("tavily-key").value;
            localStorage.setItem('ai_sys_prompt', systemPrompt);
            localStorage.setItem('ai_tools_enabled', toolsEnabled);
            localStorage.setItem('ai_router_enabled', routerEnabled);
            localStorage.setItem('ai_model', activeModel);
            localStorage.setItem('ai_tavily_key', tavilyApiKey);
            toggleSettings();
        }

        function toggleWebSearch() {
            forceWebSearch = !forceWebSearch;
            const btn = document.getElementById('web-search-btn');
            if (forceWebSearch) {
                btn.classList.add('web-search-active');
            } else {
                btn.classList.remove('web-search-active');
            }
        }

        function toggleThinking() {
            thinkingEnabled = !thinkingEnabled;
            const btn = document.getElementById('think-btn');
            if (thinkingEnabled) {
                btn.classList.add('think-active');
            } else {
                btn.classList.remove('think-active');
            }
        }

        function startNewChat() {
            currentChatId = Date.now().toString();
            messageHistory = [];
            chats.unshift({ id: currentChatId, title: 'New Conversation', messages: [] });
            saveState();
            loadChat(currentChatId);
        }

        function loadChat(id) {
            currentChatId = id;
            const chat = chats.find(c => c.id === id);
            messageHistory = chat.messages ? [...chat.messages] : [];
            chatEl.innerHTML = "";
            
            if (messageHistory.length === 0) {
                showWelcomeHero();
            } else {
                hideWelcomeHero();
                messageHistory.forEach(msg => appendMessage(msg.role, msg.content));
            }
            renderSidebar();
        }

        function showWelcomeHero() {
            const hero = document.createElement('div');
            hero.id = 'welcome-hero';
            hero.className = 'welcome-hero flex flex-col items-center justify-center text-center pt-16 sm:pt-24 pb-8';
            hero.innerHTML = `
                <div class="float-anim mb-6">
                    <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-teal-400 to-emerald-500 flex items-center justify-center shadow-2xl shadow-teal-500/25">
                        <svg class="w-8 h-8 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
                    </div>
                </div>
                <h2 class="font-display font-bold text-3xl sm:text-4xl text-white mb-3 tracking-tight">How can I help today?</h2>
                <p class="text-zinc-500 text-sm sm:text-base max-w-md leading-relaxed">Nexus is ready for your next big idea. Ask about code, research, design, or anything in between.</p>
                
                <div class="grid grid-cols-1 sm:grid-cols-3 gap-3 mt-10 w-full max-w-xl px-4">
                    <div class="suggestion-card rounded-xl p-4 text-left" onclick="useSuggestion('Search the web for the latest AI news today')">
                        <div class="text-teal-400 mb-2"><svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg></div>
                        <p class="text-xs font-semibold text-zinc-300">Web Research</p>
                        <p class="text-[11px] text-zinc-600 mt-1">"Latest AI news today..."</p>
                    </div>
                    <div class="suggestion-card rounded-xl p-4 text-left" onclick="useSuggestion('Write a Python script to sort a list of numbers and find the median')">
                        <div class="text-teal-400 mb-2"><svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"></polyline><polyline points="8 6 2 12 8 18"></polyline></svg></div>
                        <p class="text-xs font-semibold text-zinc-300">Code Generation</p>
                        <p class="text-[11px] text-zinc-600 mt-1">"Write a Python script..."</p>
                    </div>
                    <div class="suggestion-card rounded-xl p-4 text-left" onclick="useSuggestion('Remember that my favorite programming language is Python')">
                        <div class="text-teal-400 mb-2"><svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a2 2 0 0 1 2 2c0 .74-.4 1.39-1 1.73V7h1a7 7 0 0 1 7 7h1a1 1 0 0 1 1 1v3a1 1 0 0 1-1 1h-1v1a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-1H2a1 1 0 0 1-1-1v-3a1 1 0 0 1 1-1h1a7 7 0 0 1 7-7h1V5.73c-.6-.34-1-1.02-1-1.73a2 2 0 0 1 2-2z"/></svg></div>
                        <p class="text-xs font-semibold text-zinc-300">Memory</p>
                        <p class="text-[11px] text-zinc-600 mt-1">"Remember that I..."</p>
                    </div>
                </div>
            `;
            chatEl.appendChild(hero);
        }

        function hideWelcomeHero() {
            const hero = document.getElementById('welcome-hero');
            if (hero) hero.remove();
        }

        function useSuggestion(text) {
            inputEl.value = text;
            inputEl.focus();
        }

        function renderSidebar() {
            chatListEl.innerHTML = '';
            chats.forEach(chat => {
                const item = document.createElement('div');
                const active = chat.id === currentChatId;
                item.className = `sidebar-item p-2.5 rounded-xl text-[13px] mb-0.5 font-medium flex justify-between items-center group border border-transparent ${
                    active ? 'active text-white' : 'text-zinc-500 hover:text-zinc-300'
                }`;
                
                const titleSpan = document.createElement('span');
                titleSpan.className = "truncate cursor-pointer flex-1";
                titleSpan.innerText = chat.title;
                titleSpan.onclick = () => loadChat(chat.id);
                
                const deleteBtn = document.createElement('button');
                deleteBtn.className = "opacity-0 group-hover:opacity-100 p-1 hover:bg-white/10 rounded-md text-zinc-600 hover:text-red-400 transition-all ml-2";
                deleteBtn.innerHTML = `<svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18"></path><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>`;
                deleteBtn.title = "Delete Chat";
                deleteBtn.onclick = (e) => deleteChat(e, chat.id);
                
                item.appendChild(titleSpan);
                item.appendChild(deleteBtn);
                chatListEl.appendChild(item);
            });
        }

        function deleteChat(e, id) {
            e.stopPropagation();
            chats = chats.filter(c => c.id !== id);
            saveState();
            if (chats.length === 0) {
                startNewChat();
            } else if (currentChatId === id) {
                loadChat(chats[0].id);
            } else {
                renderSidebar();
            }
        }

        function createStatusBadge(text, iconStr) {
            return `
                <div class="inline-flex items-center gap-2.5 px-3 py-1.5 rounded-full bg-teal-500/8 border border-teal-500/15 text-teal-300 text-[11px] font-semibold mb-2 anim-slide-in shadow-sm">
                    <div class="dot-typing !p-0 !gap-1">
                        <div class="dot !w-1 !h-1"></div>
                        <div class="dot !w-1 !h-1"></div>
                        <div class="dot !w-1 !h-1"></div>
                    </div>
                    <span class="ml-1 tracking-wide uppercase">${text}</span>
                </div>
            `;
        }

        function appendMessage(role, content, id = null) {
            hideWelcomeHero();
            const div = document.createElement("div");
            div.className = "flex gap-3.5 w-full anim-slide-in";
            if (id) div.id = id;

            const isAI = role === 'ai' || role === 'assistant';
            
            let avatar;
            if (isAI) {
                avatar = `<div class="w-8 h-8 rounded-xl bg-gradient-to-br from-teal-400 to-emerald-500 flex items-center justify-center shrink-0 shadow-md shadow-teal-500/15 mt-0.5"><svg class="w-4 h-4 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg></div>`;
            } else {
                avatar = `<div class="w-8 h-8 rounded-xl bg-zinc-800/80 flex items-center justify-center shrink-0 text-xs font-bold border border-white/8 text-zinc-400 mt-0.5">U</div>`;
            }

            const bubbleClass = isAI ? 'msg-ai' : 'msg-user-bubble rounded-2xl p-4';

            div.innerHTML = `
                ${avatar}
                <div class="flex-1 min-w-0 max-w-full ${bubbleClass}">
                    <div class="status-area flex flex-col items-start"></div>
                    <div class="prose prose-invert prose-zinc max-w-none text-[14.5px] leading-relaxed content-area text-zinc-300">
                        ${isAI && content !== '...' ? formatMarkdown(content) : content}
                    </div>
                </div>
            `;

            if (content === '...') {
                div.querySelector('.content-area').innerHTML = `
                    <div class="flex space-x-1 py-3 px-2">
                        <div class="w-2 h-2 bg-zinc-500 rounded-full animate-bounce"></div>
                        <div class="w-2 h-2 bg-zinc-500 rounded-full animate-bounce" style="animation-delay: 0.1s"></div>
                        <div class="w-2 h-2 bg-zinc-500 rounded-full animate-bounce" style="animation-delay: 0.2s"></div>
                    </div>
                `;
            }

            chatEl.appendChild(div);
            scrollToBottom();
            return div;
        }

        function formatMarkdown(text) {
            if (typeof marked === 'undefined') return text;
            
            let processedText = text;
            
            processedText = processedText.replace(/<think>([\s\S]*?)<\/think>/gi, (match, p1) => {
                return `\n<details class="think-block" open><summary class="text-xs font-bold text-yellow-500 cursor-pointer uppercase tracking-wider mb-2 outline-none">Thinking Process</summary>\n\n${p1}\n\n</details>\n`;
            });
            
            if (processedText.includes('<think>') && !processedText.includes('</think>')) {
                let parts = processedText.split('<think>');
                processedText = parts[0] + `\n<details class="think-block" open><summary class="text-xs font-bold text-yellow-500 cursor-pointer uppercase tracking-wider mb-2 outline-none">Thinking Process</summary>\n\n${parts[1]}\n\n<div class="mt-3 text-yellow-500/60 text-xs italic animate-pulse">... thinking ...</div>\n</details>\n`;
            }

            const html = marked.parse(processedText, { breaks: true });
            return DOMPurify.sanitize(html);
        }

        function scrollToBottom() {
            chatContainer.scrollTo({ top: chatContainer.scrollHeight, behavior: 'smooth' });
        }

        async function sendMessage(hiddenText = null) {
            const text = hiddenText || inputEl.value.trim();
            if (!text && stagedFiles.length === 0 && stagedImages.length === 0 && !hiddenText) return;

            if (!hiddenText) {
                inputEl.value = "";
                inputEl.style.height = "auto";
            }
            inputEl.disabled = true;
            sendBtn.disabled = true;

            // Handle staged files context
            let injectionNotice = "";
            let userDisplayMsg = text;
            
            let htmlChips = "";
            if (stagedFiles.length > 0) {
                const names = stagedFiles.map(f => f.name).join(", ");
                htmlChips += stagedFiles.map(f => `<span class="bg-white/10 px-2 py-1 rounded text-xs font-medium border border-white/10">📎 ${f.name}</span>`).join('');
                injectionNotice = `System Notice: The user has attached the following document(s) alongside this prompt: [${names}]. If the user asks about them, search within them using [SEARCH_DOC: query].\n\n`;
                
                // Clear UI staged files
                stagedFiles = [];
            }
            if (stagedImages.length > 0) {
                htmlChips += stagedImages.map(() => `<span class="bg-white/10 px-2 py-1 rounded text-xs font-medium border border-white/10">🖼️ Image Attached</span>`).join('');
            }
            if (htmlChips) {
                userDisplayMsg = `<div class="flex flex-wrap gap-2 mb-2">\n${htmlChips}\n</div>\n${text}`;
                document.getElementById('staged-files').innerHTML = '';
            }

            // Fallback for empty text but files attached
            if (!text && userDisplayMsg !== text) {
                userDisplayMsg += "*Sent attachments without prompt.*";
            }

            if (!hiddenText) {
                appendMessage("user", userDisplayMsg);
                // Push actual system context history (hidden to user)
                let msgObj = { role: "user", content: injectionNotice + text };
                if (stagedImages.length > 0) {
                    msgObj.images = [...stagedImages];
                    stagedImages = []; // Clear images
                }
                messageHistory.push(msgObj);
            } else {
                messageHistory.push({ role: "user", content: hiddenText });
            }

            let initialPlaceholder = '<div class="text-zinc-500 text-sm italic font-medium py-1 animate-pulse tracking-wide">... working ...</div>';
            if (thinkingEnabled) {
                initialPlaceholder = '<div class="text-yellow-500/80 text-sm italic font-medium py-1 animate-pulse tracking-wide">... thinking ...</div>';
            }
            const aiMsgDiv = appendMessage("ai", initialPlaceholder);
            const contentArea = aiMsgDiv.querySelector('.content-area');
            const statusArea = aiMsgDiv.querySelector('.status-area');
            let accumulatedContent = "";

            try {
                let sPrompt = systemPrompt;
                if (!sPrompt) sPrompt = "You are Nexus, a highly capable AI assistant.";
                if (toolsEnabled) {
                    sPrompt += `\n(Background Router Node sequence initiated. Await sub-agent instructions.)`;
                }

                let fullHistory = [{ role: "system", content: sPrompt }];
                fullHistory = [...fullHistory, ...messageHistory];

                const response = await fetch("/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ 
                        messages: fullHistory, 
                        tools_enabled: toolsEnabled, 
                        router_enabled: routerEnabled,
                        force_web_search: forceWebSearch,
                        thinking_enabled: thinkingEnabled,
                        model: activeModel,
                        tavily_api_key: tavilyApiKey
                    })
                });

                if (!response.ok) throw new Error("Server communication failed.");

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                
                let firstChunkReceived = false;

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    if (!firstChunkReceived) {
                        contentArea.innerHTML = "";
                        firstChunkReceived = true;
                    }
                    
                    const chunkStr = decoder.decode(value);
                    const lines = chunkStr.split('\n');
                    
                    for (const line of lines) {
                        if (!line.trim()) continue;
                        try {
                            const data = JSON.parse(line);
                            if (data.type === 'status') {
                                statusArea.insertAdjacentHTML('beforeend', createStatusBadge(data.text));
                            } else if (data.type === 'content') {
                                accumulatedContent += data.text;
                                contentArea.innerHTML = formatMarkdown(accumulatedContent);
                                scrollToBottom();
                            } else if (data.type === 'action_request') {
                                const actionId = Date.now().toString();
                                const shellCode = data.command.replace(/'/g, "&apos;").replace(/"/g, "&quot;");
                                const actionHTML = `
                                <div class="mt-4 p-4 bg-orange-500/10 border border-orange-500/20 rounded-xl" id="action-${actionId}">
                                    <div class="flex items-center gap-2 text-orange-400 font-semibold text-sm mb-2">
                                        <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
                                        Permission Required
                                    </div>
                                    <p class="text-xs text-zinc-400 mb-3">The Administrator Node wants to execute:</p>
                                    <pre class="bg-black/30 p-3 rounded-lg text-xs font-mono text-zinc-300 mb-3 overflow-x-auto border border-white/5"><code>${shellCode}</code></pre>
                                    <div class="flex gap-2">
                                        <button onclick="approveShellAction('${actionId}', '${shellCode}')" class="flex-1 bg-teal-500/15 hover:bg-teal-500/25 text-teal-300 py-2 rounded-lg text-xs font-semibold transition-colors border border-teal-500/20">✓ Approve</button>
                                        <button onclick="denyShellAction('${actionId}')" class="flex-1 bg-white/5 hover:bg-white/10 text-zinc-500 py-2 rounded-lg text-xs font-semibold transition-colors border border-white/8">✗ Deny</button>
                                    </div>
                                </div>`;
                                contentArea.insertAdjacentHTML('beforeend', actionHTML);
                                scrollToBottom();
                            } else if (parsed.type === "chart") {
                                const imgHTML = `<div class="mt-3 rounded-xl overflow-hidden border border-white/10 shadow-lg shadow-black/40"><img src="${parsed.url}" class="w-full rounded-xl" alt="Generated Chart" /></div>`;
                                contentArea.insertAdjacentHTML('beforeend', imgHTML);
                                scrollToBottom();
                            }
                        } catch(e) {
                            // In case of fragmented JSON, append as text (fallback)
                            accumulatedContent += line;
                            contentArea.innerHTML = formatMarkdown(accumulatedContent);
                        }
                    }
                }

                // Append Final Message to History
                messageHistory.push({ role: "assistant", content: accumulatedContent });
                
                const currentChat = chats.find(c => c.id === currentChatId);
                if (currentChat && currentChat.title === 'New Conversation') {
                    currentChat.title = text.substring(0, 35) + (text.length > 35 ? '...' : '');
                }
                if (currentChat) currentChat.messages = [...messageHistory];
                
                saveState();
                renderSidebar();

            } catch (err) {
                console.error(err);
                contentArea.innerHTML = `<div class="bg-red-500/10 border border-red-500/15 text-red-400 p-4 rounded-xl text-sm font-medium">⚠️ Connection Interrupted: ${err.message}</div>`;
            } finally {
                inputEl.disabled = false;
                sendBtn.disabled = false;
                if (!hiddenText) inputEl.focus();
                
                // TTS: Read the final AI response aloud
                if (ttsEnabled && accumulatedContent) {
                    speakText(accumulatedContent);
                }
                
                document.querySelectorAll('.prose pre code').forEach((block) => {
                    hljs.highlightElement(block);
                });
            }
        }

        async function approveShellAction(id, command) {
            document.getElementById(`action-${id}`).innerHTML = '<div class="text-teal-400 font-semibold text-sm flex items-center gap-2"><div class="dot-typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div> Executing...</div>';
            try {
                const res = await fetch('/execute_shell', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ command: command })
                });
                const data = await res.json();
                document.getElementById(`action-${id}`).style.display = 'none';
                
                const hiddenPrompt = `System Notice: The user explicitly APPROVED and executed the shell command: \`${command}\`\n\nTerminal Output:\n${data.output}\n\nPlease read these logs and tell the user the result in a conversational tone.`;
                sendMessage(hiddenPrompt);
            } catch(e) {
                document.getElementById(`action-${id}`).innerHTML = `<div class="text-red-400 font-bold text-sm">⚠️ Execution failed: ${e.message}</div>`;
            }
        }
        
        function denyShellAction(id) {
            document.getElementById(`action-${id}`).style.display = 'none';
            const hiddenPrompt = `System Notice: The user DENIED the authorization to run the shell command. Apologize and find another way.`;
            sendMessage(hiddenPrompt);
        }

        async function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            const fileId = "file-" + Date.now();
            const stagedContainer = document.getElementById('staged-files');
            
            // --- IMAGE HANDLING LOGIC ---
            if (file.type.startsWith('image/')) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const rawBase64 = e.target.result.split(',')[1];
                    stagedImages.push(rawBase64);
                    
                    const chip = document.createElement('div');
                    chip.id = fileId;
                    chip.className = "flex items-center gap-2 px-3 py-1.5 rounded-lg bg-violet-900/30 border border-violet-500/20 text-xs font-medium text-violet-300 anim-slide-in";
                    chip.innerHTML = `
                        <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
                        ${file.name}
                    `;
                    stagedContainer.appendChild(chip);
                    document.getElementById('file-upload').value = '';
                };
                reader.readAsDataURL(file);
                return;
            }

            // --- DOCUMENT LOGIC ---
            stagedFiles.push({ id: fileId, name: file.name, ready: false });
            
            // Add initial loading chip
            const chip = document.createElement('div');
            chip.id = fileId;
            chip.className = "flex items-center gap-2 px-3 py-1.5 rounded-lg bg-zinc-800/60 border border-white/8 text-xs font-medium text-zinc-300 anim-slide-in";
            chip.innerHTML = `
                <svg class="w-3.5 h-3.5 animate-spin" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-6.219-8.56"></path></svg>
                ${file.name}
            `;
            stagedContainer.appendChild(chip);

            const formData = new FormData();
            formData.append('file', file);

            try {
                const response = await fetch('/upload', { method: 'POST', body: formData });
                const data = await response.json();
                
                if (response.ok) {
                    const match = stagedFiles.find(f => f.id === fileId);
                    if (match) match.ready = true;
                    chip.classList.replace('bg-zinc-800/60', 'bg-teal-900/30');
                    chip.classList.replace('border-white/8', 'border-teal-500/20');
                    chip.innerHTML = `
                        <svg class="w-3.5 h-3.5 text-teal-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6L9 17l-5-5"></path></svg>
                        ${file.name}
                    `;
                } else {
                    throw new Error(data.error || "Upload failed");
                }
            } catch (err) {
                console.error(err);
                chip.classList.replace('bg-zinc-800/60', 'bg-red-900/30');
                chip.classList.replace('border-white/8', 'border-red-500/20');
                chip.innerHTML = `
                    <svg class="w-3.5 h-3.5 text-red-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>
                    Error: ${err.message}
                `;
                // Remove failed file from standard queue
                stagedFiles = stagedFiles.filter(f => f.id !== fileId);
            } finally {
                document.getElementById('file-upload').value = ''; // reset input
            }
        }

        function saveState() {
            localStorage.setItem('ai_chats_v3', JSON.stringify(chats));
        }

        // =============================================
        // === 🎙️ VOICE MODULE: STT + TTS (FREE) ====
        // =============================================
        
        let ttsEnabled = false;
        let micActive = false;
        let recognition = null;

        // --- Text-to-Speech (TTS) ---
        function speakText(text) {
            if (!ttsEnabled || !text) return;
            window.speechSynthesis.cancel(); // stop any ongoing speech

            // Strip markdown symbols for clean audio output
            const cleanText = text
                .replace(/\[.*?\]/g, '') // remove [SEARCH: ...] style tags
                .replace(/#{1,6}\s/g, '') // remove headers
                .replace(/[*_`]/g, '')    // remove bold/italic/code markers
                .replace(/https?:\/\/\S+/g, 'a link') // replace URLs
                .trim();

            if (!cleanText) return;

            const utterance = new SpeechSynthesisUtterance(cleanText);
            // Pick the best available voice
            const voices = window.speechSynthesis.getVoices();
            const preferredVoice = voices.find(v =>
                v.name.includes('Google UK English Female') ||
                v.name.includes('Microsoft Zira') ||
                v.name.includes('Google US English') ||
                (v.lang.startsWith('en') && !v.localService)
            ) || voices.find(v => v.lang.startsWith('en')) || voices[0];

            if (preferredVoice) utterance.voice = preferredVoice;
            utterance.rate = 1.0;
            utterance.pitch = 1.0;
            utterance.volume = 1.0;

            window.speechSynthesis.speak(utterance);
        }

        function toggleTTS() {
            ttsEnabled = !ttsEnabled;
            const btn = document.getElementById('tts-btn');
            if (ttsEnabled) {
                btn.classList.add('tts-active');
                btn.title = 'Read Aloud: ON (click to turn off)';
                // Announce it's on
                const utter = new SpeechSynthesisUtterance('Voice output enabled.');
                window.speechSynthesis.speak(utter);
            } else {
                btn.classList.remove('tts-active');
                btn.title = 'Read Aloud (TTS)';
                window.speechSynthesis.cancel();
            }
        }

        // --- Speech-to-Text (STT) ---
        function toggleMic() {
            if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
                alert('🎤 Voice input is not supported in this browser. Please use Chrome or Edge.');
                return;
            }
            if (micActive) {
                stopMic();
            } else {
                startMic();
            }
        }

        function startMic() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.lang = 'en-US';
            recognition.interimResults = true;
            recognition.continuous = false;

            const micBtn = document.getElementById('mic-btn');
            const voiceIndicator = document.getElementById('voice-indicator');

            recognition.onstart = () => {
                micActive = true;
                micBtn.classList.add('mic-active');
                voiceIndicator.classList.add('active');
            };

            recognition.onresult = (event) => {
                const transcript = Array.from(event.results)
                    .map(r => r[0].transcript)
                    .join('');
                inputEl.value = transcript;
                inputEl.style.height = 'auto';
                inputEl.style.height = inputEl.scrollHeight + 'px';
            };

            recognition.onend = () => {
                micActive = false;
                micBtn.classList.remove('mic-active');
                voiceIndicator.classList.remove('active');
                // Auto-send if there's text in the box
                if (inputEl.value.trim()) {
                    setTimeout(() => sendMessage(), 300);
                }
            };

            recognition.onerror = (event) => {
                micActive = false;
                micBtn.classList.remove('mic-active');
                voiceIndicator.classList.remove('active');
                if (event.error !== 'no-speech') {
                    console.warn('Voice recognition error:', event.error);
                }
            };

            recognition.start();
        }

        function stopMic() {
            if (recognition) {
                recognition.stop();
            }
        }

        // Pre-load voices on page ready
        window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();

        // =============================================
        // === 👁️ VISION MODULE: Ctrl+V Image Paste ===
        // =============================================
        function stageImageFromBlob(blob, label) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const rawBase64 = e.target.result.split(',')[1];
                const mimeType = blob.type || 'image/png';
                const dataUrl = e.target.result;
                stagedImages.push(rawBase64);

                const stagedContainer = document.getElementById('staged-files');
                const chip = document.createElement('div');
                chip.className = 'flex items-center gap-2 px-3 py-1.5 rounded-lg bg-violet-900/30 border border-violet-500/20 text-xs font-medium text-violet-300 anim-slide-in';
                chip.innerHTML = `
                    <img src="${dataUrl}" class="w-8 h-8 rounded object-cover border border-violet-500/30" />
                    <span>${label}</span>
                    <span class="text-violet-400/60 text-[10px] font-bold uppercase tracking-wider">Vision</span>
                `;
                stagedContainer.appendChild(chip);
            };
            reader.readAsDataURL(blob);
        }

        // Ctrl+V paste into the input area
        document.getElementById('input').addEventListener('paste', function(e) {
            const items = (e.clipboardData || window.clipboardData).items;
            for (let i = 0; i < items.length; i++) {
                if (items[i].type.startsWith('image/')) {
                    e.preventDefault();
                    const blob = items[i].getAsFile();
                    stageImageFromBlob(blob, 'Pasted Image');
                    break;
                }
            }
        });
    </script>
