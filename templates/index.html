<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus AI Engine</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/tokyo-night-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #09090b; }
        h1, h2, h3, .font-display { font-family: 'Outfit', sans-serif; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 10px; }
        
        .glass-panel {
            background: rgba(24, 24, 27, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .prose pre { background-color: #18181b !important; padding: 1rem; border-radius: 0.75rem; overflow-x: auto; border: 1px solid rgba(255, 255, 255, 0.05); margin-top: 1em; margin-bottom: 1em; }
        .prose code { background-color: rgba(255,255,255,0.1); padding: 0.2rem 0.4rem; border-radius: 0.25rem; font-family: monospace; font-size: 0.9em; }
        .prose pre code { background-color: transparent; padding: 0; }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .anim-slide-in { animation: slideIn 0.3s ease-out forwards; }

        @keyframes pulse-glow {
            0%, 100% { opacity: 0.5; box-shadow: 0 0 10px rgba(139, 92, 246, 0.2); }
            50% { opacity: 1; box-shadow: 0 0 20px rgba(139, 92, 246, 0.6); }
        }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background-color: #a78bfa; animation: pulse-glow 2s infinite; }

        textarea { resize: none; transition: height 0.2s ease, border-color 0.2s; }
        
        /* Shimmer loading effect */
        .shimmer {
            background: linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.05) 50%, rgba(255,255,255,0) 100%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    </style>
</head>

<body class="text-zinc-300 h-screen flex overflow-hidden antialiased selection:bg-purple-500/30">

    <!-- Sidebar -->
    <div class="hidden md:flex w-[280px] glass-panel z-10 flex-col h-full border-r border-white/10">
        <div class="p-5 flex items-center justify-between">
            <h1 class="font-display font-semibold text-xl tracking-tight bg-gradient-to-r from-indigo-400 to-purple-400 bg-clip-text text-transparent">Nexus</h1>
            <button onclick="startNewChat()" class="p-2 rounded-lg hover:bg-white/10 transition-colors tooltip" title="New Chat">
                <svg class="w-5 h-5 text-zinc-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            </button>
        </div>
        <div class="flex-1 overflow-y-auto px-3 pb-4">
            <p class="text-[11px] font-semibold text-zinc-500 mb-3 px-2 uppercase tracking-wider">Conversations</p>
            <div id="chat-list" class="flex flex-col space-y-1"></div>
        </div>
        <div class="p-4 border-t border-white/10">
            <button onclick="toggleSettings()" class="flex items-center gap-3 w-full p-2.5 rounded-xl hover:bg-white/5 transition-colors text-sm text-zinc-300 font-medium">
                <div class="w-8 h-8 rounded-full bg-gradient-to-br from-zinc-700 to-zinc-900 flex items-center justify-center border border-white/10 shrink-0">
                    <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 15a3 3 0 100-6 3 3 0 000 6z"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
                </div>
                Settings
            </button>
        </div>
    </div>

    <!-- Main Chat Area -->
    <div class="flex-1 flex flex-col h-full relative bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] bg-fixed" style="background-color: #09090b; background-blend-mode: overlay;">
        <div id="chat-container" class="flex-1 overflow-y-auto w-full pb-44 pt-8 px-4 sm:px-6">
            <div id="chat" class="max-w-4xl mx-auto flex flex-col space-y-8">
                <!-- Chat messages injected here -->
            </div>
        </div>

        <!-- Input Area -->
        <div class="absolute bottom-0 left-0 w-full bg-gradient-to-t from-zinc-950 via-zinc-950/90 to-transparent pt-12 pb-6 px-4 sm:px-6 z-20">
            <div class="max-w-3xl mx-auto relative group">
                <div class="absolute -inset-1 bg-gradient-to-r from-purple-600/30 to-indigo-600/30 rounded-3xl blur opacity-25 group-focus-within:opacity-50 transition duration-500"></div>
                <div class="relative glass-panel rounded-2xl border border-white/10 group-focus-within:border-purple-500/50 transition-all flex flex-col p-2 sm:p-3 shadow-2xl">
                    <div id="staged-files" class="flex flex-wrap gap-2 mb-2 px-1 empty:hidden"></div>
                    
                    <div class="flex items-end">
                        <!-- File Upload Input Hidden -->
                        <input type="file" id="file-upload" class="hidden" accept=".pdf,.txt,.md,image/*" onchange="handleFileUpload(event)">
                        
                        <button onclick="document.getElementById('file-upload').click()" class="p-3 mb-1 ml-1 bg-white/10 text-zinc-300 hover:bg-white/20 rounded-xl transition-all shadow-sm shrink-0 tooltip" title="Attach Document">
                            <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path></svg>
                        </button>

                        <textarea 
                            id="input" 
                            rows="1"
                            placeholder="Message Nexus..." 
                            class="w-full max-h-[200px] bg-transparent text-zinc-100 placeholder-zinc-500 px-3 py-3 border-none outline-none focus:ring-0 text-[15px] leading-relaxed"
                        ></textarea>
                        
                        <button id="send-btn" onclick="sendMessage()" class="p-3 mb-1 mr-1 bg-white text-zinc-900 hover:bg-zinc-200 rounded-xl transition-all disabled:opacity-30 disabled:cursor-not-allowed shadow-sm shrink-0">
                            <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="19" x2="12" y2="5"></line><polyline points="5 12 12 5 19 12"></polyline></svg>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal" class="hidden fixed inset-0 bg-black/60 z-50 flex items-center justify-center backdrop-blur-md opacity-0 transition-opacity">
        <div class="bg-zinc-900 border border-white/10 rounded-2xl w-full max-w-lg p-6 shadow-2xl transform scale-95 transition-transform">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-display font-semibold">Settings</h2>
                <button onclick="toggleSettings()" class="text-zinc-400 hover:text-white p-1 rounded-md hover:bg-white/10 transition-colors">
                    <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            </div>
            <div class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-zinc-400 mb-2">System Instructions</label>
                    <textarea id="sys-prompt" rows="5" class="w-full bg-zinc-950 text-zinc-200 border border-white/10 rounded-xl p-4 focus:border-purple-500/50 focus:ring-1 focus:ring-purple-500/50 outline-none transition-all resize-none text-sm" placeholder="You are Nexus..."></textarea>
                </div>
                <div>
                    <label class="block text-sm font-medium text-zinc-400 mb-2">AI Model</label>
                    <select id="model-select" class="w-full bg-zinc-950 text-zinc-200 border border-white/10 rounded-xl p-3 focus:border-purple-500/50 outline-none appearance-none cursor-pointer text-sm">
                        <option value="gemma4:e2b">Loading models...</option>
                    </select>
                </div>
                <div class="flex items-center justify-between p-3 rounded-xl bg-white/5 border border-white/5">
                    <div>
                        <p class="text-sm font-medium text-white">Enable Deep Tools</p>
                        <p class="text-xs text-zinc-500">Allows AI to search web and access DB memory.</p>
                    </div>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" id="tools-toggle" checked class="sr-only peer">
                        <div class="w-11 h-6 bg-zinc-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-purple-500"></div>
                    </label>
                </div>
                <button onclick="saveSettings()" class="w-full bg-white text-zinc-900 hover:bg-zinc-200 font-medium py-3 rounded-xl transition-colors mt-2 shadow-sm">Save Preferences</button>
            </div>
        </div>
    </div>

    <script>
        let chats = [];
        let currentChatId = null;
        let messageHistory = [];
        let stagedFiles = []; // Track active uploaded files for the next prompt
        let stagedImages = []; // Track base64 image strings
        let systemPrompt = localStorage.getItem('ai_sys_prompt') || '';
        let toolsEnabled = localStorage.getItem('ai_tools_enabled') !== 'false';
        let activeModel = localStorage.getItem('ai_model') || 'gemma4:e2b';

        const chatEl = document.getElementById("chat");
        const chatContainer = document.getElementById("chat-container");
        const inputEl = document.getElementById("input");
        const sendBtn = document.getElementById("send-btn");
        const chatListEl = document.getElementById("chat-list");

        document.addEventListener("DOMContentLoaded", () => {
            const stored = localStorage.getItem('ai_chats_v3'); // increment version to drop old invalid histories
            chats = stored ? JSON.parse(stored) : [];
            document.getElementById("sys-prompt").value = systemPrompt;
            document.getElementById("tools-toggle").checked = toolsEnabled;
            fetchModels();
            
            if (chats.length === 0) startNewChat();
            else loadChat(chats[0].id);
            renderSidebar();
        });

        inputEl.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight > 200 ? 200 : this.scrollHeight) + 'px';
        });

        inputEl.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        function toggleSettings() {
            const modal = document.getElementById("settings-modal");
            const modalInner = modal.querySelector('div');
            
            if (modal.classList.contains('hidden')) {
                modal.classList.remove('hidden');
                setTimeout(() => {
                    modal.classList.remove('opacity-0');
                    modalInner.classList.remove('scale-95');
                }, 10);
            } else {
                modal.classList.add('opacity-0');
                modalInner.classList.add('scale-95');
                setTimeout(() => {
                    modal.classList.add('hidden');
                }, 300);
            }
        }

        async function fetchModels() {
            try {
                const res = await fetch('/models');
                const data = await res.json();
                const select = document.getElementById('model-select');
                if (data.models && data.models.length > 0) {
                    select.innerHTML = data.models.map(m => `<option value="${m}">${m}</option>`).join('');
                    if (data.models.includes(activeModel)) {
                        select.value = activeModel;
                    } else {
                        activeModel = data.models[0];
                        select.value = activeModel;
                    }
                }
            } catch (e) {
                console.error("Failed to load models", e);
            }
        }

        function saveSettings() {
            systemPrompt = document.getElementById("sys-prompt").value;
            toolsEnabled = document.getElementById("tools-toggle").checked;
            activeModel = document.getElementById("model-select").value;
            localStorage.setItem('ai_sys_prompt', systemPrompt);
            localStorage.setItem('ai_tools_enabled', toolsEnabled);
            localStorage.setItem('ai_model', activeModel);
            toggleSettings();
        }

        function startNewChat() {
            currentChatId = Date.now().toString();
            messageHistory = [];
            chats.unshift({ id: currentChatId, title: 'New Conversation', messages: [] });
            saveState();
            loadChat(currentChatId);
        }

        function loadChat(id) {
            currentChatId = id;
            const chat = chats.find(c => c.id === id);
            messageHistory = chat.messages ? [...chat.messages] : [];
            chatEl.innerHTML = "";
            
            if (messageHistory.length === 0) {
                appendMessage("ai", "Greetings. I am Nexus, your advanced assistant. How may I assist you today?");
            } else {
                messageHistory.forEach(msg => appendMessage(msg.role, msg.content));
            }
            renderSidebar();
        }

        function renderSidebar() {
            chatListEl.innerHTML = '';
            chats.forEach(chat => {
                const item = document.createElement('div');
                const active = chat.id === currentChatId;
                item.className = `p-3 rounded-xl text-sm cursor-pointer truncate transition-all mb-1 font-medium ${
                    active ? 'bg-white/10 text-white shadow-sm border border-white/5' : 'hover:bg-white/5 text-zinc-400 border border-transparent'
                }`;
                item.innerText = chat.title;
                item.onclick = () => loadChat(chat.id);
                chatListEl.appendChild(item);
            });
        }

        function createStatusBadge(text, iconStr) {
            return `
                <div class="inline-flex items-center gap-2 px-3 py-1.5 rounded-full bg-purple-500/10 border border-purple-500/20 text-purple-300 text-xs font-medium mb-3 anim-slide-in">
                    ${iconStr || '<div class="status-dot"></div>'}
                    ${text}
                </div>
            `;
        }

        function appendMessage(role, content, id = null) {
            const div = document.createElement("div");
            div.className = "flex gap-4 w-full group anim-slide-in";
            if (id) div.id = id;

            const isAI = role === 'ai';
            
            let avatar;
            if (isAI) {
                avatar = `<div class="w-8 h-8 rounded-full bg-gradient-to-tr from-indigo-500 to-purple-500 flex items-center justify-center shrink-0 shadow-lg shadow-purple-500/20"><svg class="w-5 h-5 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a2 2 0 0 1 2 2c0 .74-.4 1.39-1 1.73V7h1a7 7 0 0 1 7 7h1a1 1 0 0 1 1 1v3a1 1 0 0 1-1 1h-1v1a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-1H2a1 1 0 0 1-1-1v-3a1 1 0 0 1 1-1h1a7 7 0 0 1 7-7h1V5.73c-.6-.34-1-1.02-1-1.73a2 2 0 0 1 2-2zM9 14a2 2 0 1 0 0-4 2 2 0 0 0 0 4zm6 0a2 2 0 1 0 0-4 2 2 0 0 0 0 4z"/></svg></div>`;
            } else {
                avatar = `<div class="w-8 h-8 rounded-full bg-zinc-800 flex items-center justify-center shrink-0 text-xs font-bold border border-white/10 text-zinc-300 shadow-sm">U</div>`;
            }

            div.innerHTML = `
                ${avatar}
                <div class="flex-1 min-w-0 max-w-full">
                    <div class="status-area flex flex-col items-start"></div>
                    <div class="prose prose-invert prose-zinc max-w-none text-[15px] leading-relaxed content-area text-zinc-300">
                        ${isAI && content !== '...' ? formatMarkdown(content) : content}
                    </div>
                </div>
            `;

            if (content === '...') {
                div.querySelector('.content-area').innerHTML = `
                    <div class="flex space-x-1 py-3 px-2">
                        <div class="w-2 h-2 bg-zinc-500 rounded-full animate-bounce"></div>
                        <div class="w-2 h-2 bg-zinc-500 rounded-full animate-bounce" style="animation-delay: 0.1s"></div>
                        <div class="w-2 h-2 bg-zinc-500 rounded-full animate-bounce" style="animation-delay: 0.2s"></div>
                    </div>
                `;
            }

            chatEl.appendChild(div);
            scrollToBottom();
            return div;
        }

        function formatMarkdown(text) {
            if (typeof marked === 'undefined') return text;
            const html = marked.parse(text, { breaks: true });
            return DOMPurify.sanitize(html);
        }

        function scrollToBottom() {
            chatContainer.scrollTo({ top: chatContainer.scrollHeight, behavior: 'smooth' });
        }

        async function sendMessage() {
            const text = inputEl.value.trim();
            if ((!text && stagedFiles.length === 0 && stagedImages.length === 0) || sendBtn.disabled) return;

            inputEl.value = "";
            inputEl.style.height = "auto";
            inputEl.disabled = true;
            sendBtn.disabled = true;

            // Handle staged files context
            let injectionNotice = "";
            let userDisplayMsg = text;
            
            let htmlChips = "";
            if (stagedFiles.length > 0) {
                const names = stagedFiles.map(f => f.name).join(", ");
                htmlChips += stagedFiles.map(f => `<span class="bg-white/10 px-2 py-1 rounded text-xs font-medium border border-white/10">📎 ${f.name}</span>`).join('');
                injectionNotice = `System Notice: The user has attached the following document(s) alongside this prompt: [${names}]. If the user asks about them, search within them using [SEARCH_DOC: query].\n\n`;
                
                // Clear UI staged files
                stagedFiles = [];
            }
            if (stagedImages.length > 0) {
                htmlChips += stagedImages.map(() => `<span class="bg-white/10 px-2 py-1 rounded text-xs font-medium border border-white/10">🖼️ Image Attached</span>`).join('');
            }
            if (htmlChips) {
                userDisplayMsg = `<div class="flex flex-wrap gap-2 mb-2">\n${htmlChips}\n</div>\n${text}`;
                document.getElementById('staged-files').innerHTML = '';
            }

            // Fallback for empty text but files attached
            if (!text && userDisplayMsg !== text) {
                userDisplayMsg += "*Sent attachments without prompt.*";
            }

            appendMessage("user", userDisplayMsg);
            
            // Push actual system context history (hidden to user)
            let msgObj = { role: "user", content: injectionNotice + text };
            if (stagedImages.length > 0) {
                msgObj.images = [...stagedImages];
                stagedImages = []; // Clear images
            }
            messageHistory.push(msgObj);

            const aiMsgDiv = appendMessage("ai", "...");
            const contentArea = aiMsgDiv.querySelector('.content-area');
            const statusArea = aiMsgDiv.querySelector('.status-area');
            let accumulatedContent = "";

            try {
                let sPrompt = systemPrompt;
                if (!sPrompt) sPrompt = "You are Nexus, a highly capable AI assistant.";
                if (toolsEnabled) {
                    sPrompt += `\nYou have tools enabled.
To search the web, output exactly: [SEARCH: query] 
To read the full text of an article or website, output exactly: [READ_URL: https://...]
To save memory, output exactly: [MEM_SAVE: fact]
To search within uploaded user documents, output exactly: [SEARCH_DOC: query]
To run python code to solve math or analyze data, output exactly: [PYTHON: print("hello")]
Only output one tool per response. Tools are executed and results are sent back.`;
                }

                let fullHistory = [{ role: "system", content: sPrompt }];
                fullHistory = [...fullHistory, ...messageHistory];

                const response = await fetch("/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ messages: fullHistory, tools_enabled: toolsEnabled, model: activeModel })
                });

                if (!response.ok) throw new Error("Server communication failed.");

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                
                contentArea.innerHTML = "";

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    const chunkStr = decoder.decode(value);
                    const lines = chunkStr.split('\n');
                    
                    for (const line of lines) {
                        if (!line.trim()) continue;
                        try {
                            const data = JSON.parse(line);
                            if (data.type === 'status') {
                                statusArea.insertAdjacentHTML('beforeend', createStatusBadge(data.text));
                            } else if (data.type === 'content') {
                                accumulatedContent += data.text;
                                contentArea.innerHTML = formatMarkdown(accumulatedContent);
                                scrollToBottom();
                            }
                        } catch(e) {
                            // In case of fragmented JSON, append as text (fallback)
                            accumulatedContent += line;
                            contentArea.innerHTML = formatMarkdown(accumulatedContent);
                        }
                    }
                }

                // Append Final Message to History
                messageHistory.push({ role: "assistant", content: accumulatedContent });
                
                const currentChat = chats.find(c => c.id === currentChatId);
                if (currentChat && currentChat.title === 'New Conversation') {
                    currentChat.title = text.substring(0, 35) + (text.length > 35 ? '...' : '');
                }
                if (currentChat) currentChat.messages = [...messageHistory];
                
                saveState();
                renderSidebar();

            } catch (err) {
                console.error(err);
                contentArea.innerHTML = `<div class="bg-red-500/10 border border-red-500/20 text-red-400 p-4 rounded-xl text-sm font-medium">⚠️ Connection Interrupted: ${err.message}</div>`;
            } finally {
                inputEl.disabled = false;
                sendBtn.disabled = false;
                inputEl.focus();
                
                document.querySelectorAll('.prose pre code').forEach((block) => {
                    hljs.highlightElement(block);
                });
            }
        }

        async function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            const fileId = "file-" + Date.now();
            const stagedContainer = document.getElementById('staged-files');
            
            // --- IMAGE HANDLING LOGIC ---
            if (file.type.startsWith('image/')) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const rawBase64 = e.target.result.split(',')[1];
                    stagedImages.push(rawBase64);
                    
                    const chip = document.createElement('div');
                    chip.id = fileId;
                    chip.className = "flex items-center gap-2 px-3 py-1.5 rounded-lg bg-emerald-900/40 border border-emerald-500/30 text-xs font-medium text-emerald-300 shadow-sm anim-slide-in";
                    chip.innerHTML = `
                        <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
                        ${file.name}
                    `;
                    stagedContainer.appendChild(chip);
                    document.getElementById('file-upload').value = '';
                };
                reader.readAsDataURL(file);
                return;
            }

            // --- DOCUMENT LOGIC ---
            stagedFiles.push({ id: fileId, name: file.name, ready: false });
            
            // Add initial loading chip
            const chip = document.createElement('div');
            chip.id = fileId;
            chip.className = "flex items-center gap-2 px-3 py-1.5 rounded-lg bg-zinc-800/80 border border-white/10 text-xs font-medium text-zinc-300 shadow-sm anim-slide-in";
            chip.innerHTML = `
                <svg class="w-3.5 h-3.5 animate-spin" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-6.219-8.56"></path></svg>
                ${file.name}
            `;
            stagedContainer.appendChild(chip);

            const formData = new FormData();
            formData.append('file', file);

            try {
                const response = await fetch('/upload', { method: 'POST', body: formData });
                const data = await response.json();
                
                if (response.ok) {
                    const match = stagedFiles.find(f => f.id === fileId);
                    if (match) match.ready = true;
                    chip.classList.replace('bg-zinc-800/80', 'bg-purple-900/40');
                    chip.classList.replace('border-white/10', 'border-purple-500/30');
                    chip.innerHTML = `
                        <svg class="w-3.5 h-3.5 text-purple-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6L9 17l-5-5"></path></svg>
                        ${file.name}
                    `;
                } else {
                    throw new Error(data.error || "Upload failed");
                }
            } catch (err) {
                console.error(err);
                chip.classList.replace('bg-zinc-800/80', 'bg-red-900/40');
                chip.classList.replace('border-white/10', 'border-red-500/30');
                chip.innerHTML = `
                    <svg class="w-3.5 h-3.5 text-red-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>
                    Error: ${err.message}
                `;
                // Remove failed file from standard queue
                stagedFiles = stagedFiles.filter(f => f.id !== fileId);
            } finally {
                document.getElementById('file-upload').value = ''; // reset input
            }
        }

        function saveState() {
            localStorage.setItem('ai_chats_v3', JSON.stringify(chats));
        }
    </script>
</body>
</html>
